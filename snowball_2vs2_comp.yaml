behaviors:
  team_ppo:
    trainer_type: ppo
    hyperparameters:
      batch_size: 2048
      buffer_size: 20480
      learning_rate: 0.0003
      beta: 0.005
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
    network_settings:
      hidden_units: 512
      num_layers: 2
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    max_steps: 10000000
    self_play:
      window: 10
      play_against_latest_model_ratio: 0.5
      save_steps: 50000

  team_sac:
    trainer_type: sac
    hyperparameters:
      batch_size: 512
      buffer_size: 1000000
      learning_rate: 0.0003
      tau: 0.005
      steps_per_update: 10
      init_entcoef: 0.2
    network_settings:
      hidden_units: 512
      num_layers: 2
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
      curiosity:
        gamma: 0.99
        strength: 0.02
        learning_rate: 0.0003

    max_steps: 10000000
    self_play:
      window: 10
      play_against_latest_model_ratio: 0.5
      save_steps: 50000


